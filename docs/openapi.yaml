  openapi: 3.0.1
  info:
    title: Bank Cards Management API
    description: API для управления банковскими картами
    contact:
      name: Your Name
      email: your.email@example.com
    license:
      name: Apache 2.0
      url: http://springdoc.org
    version: '1.0'
  servers:
    - url: http://localhost:8080
      description: Generated server url
  security:
    - Bearer Authentication: []
  paths:
    /api/users/register:
      post:
        tags:
          - user-controller
        operationId: registerUser
        requestBody:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRequest'
          required: true
        responses:
          '200':
            description: OK
            content:
              '*/*':
                schema:
                  $ref: '#/components/schemas/UserDTO'
    /api/transactions/transfer:
      post:
        tags:
          - transaction-controller
        operationId: transfer
        requestBody:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionRequest'
          required: true
        responses:
          '200':
            description: OK
            content:
              '*/*':
                schema:
                  $ref: '#/components/schemas/TransactionDTO'
    /api/cards:
      get:
        tags:
          - card-controller
        operationId: findAll_1
        responses:
          '200':
            description: OK
            content:
              '*/*':
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/CardDTO'
      post:
        tags:
          - card-controller
        operationId: saveCard
        requestBody:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardRequest'
          required: true
        responses:
          '200':
            description: OK
            content:
              '*/*':
                schema:
                  $ref: '#/components/schemas/CardDTO'
    /api/cards/{id}/withdraw:
      post:
        tags:
          - card-controller
        operationId: withdrawFromCard
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: integer
              format: int64
          - name: amount
            in: query
            required: true
            schema:
              type: number
        responses:
          '200':
            description: OK
            content:
              '*/*':
                schema:
                  $ref: '#/components/schemas/CardDTO'
    /api/cards/{id}/request-block:
      post:
        tags:
          - card-controller
        operationId: requestBlockCard
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: integer
              format: int64
          - name: userId
            in: query
            required: true
            schema:
              type: integer
              format: int64
        responses:
          '200':
            description: OK
            content:
              '*/*':
                schema:
                  $ref: '#/components/schemas/CardDTO'
    /api/cards/{id}/deposit:
      post:
        tags:
          - card-controller
        operationId: depositToCard
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: integer
              format: int64
          - name: amount
            in: query
            required: true
            schema:
              type: number
        responses:
          '200':
            description: OK
            content:
              '*/*':
                schema:
                  $ref: '#/components/schemas/CardDTO'
    /api/cards/{id}/block:
      post:
        tags:
          - card-controller
        operationId: blockCard
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: integer
              format: int64
        responses:
          '200':
            description: OK
            content:
              '*/*':
                schema:
                  $ref: '#/components/schemas/CardDTO'
    /api/cards/{id}/activate:
      post:
        tags:
          - card-controller
        operationId: activateCard
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: integer
              format: int64
        responses:
          '200':
            description: OK
            content:
              '*/*':
                schema:
                  $ref: '#/components/schemas/CardDTO'
    /api/auth/login:
      post:
        tags:
          - auth-controller
        operationId: login
        requestBody:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginRequest'
          required: true
        responses:
          '200':
            description: OK
            content:
              '*/*':
                schema:
                  $ref: '#/components/schemas/LoginResponse'
    /api/users:
      get:
        tags:
          - user-controller
        operationId: findAll
        responses:
          '200':
            description: OK
            content:
              '*/*':
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/UserDTO'
    /api/users/{id}:
      get:
        tags:
          - user-controller
        operationId: findById
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: integer
              format: int64
        responses:
          '200':
            description: OK
            content:
              '*/*':
                schema:
                  $ref: '#/components/schemas/UserDTO'
      delete:
        tags:
          - user-controller
        operationId: deleteUser
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: integer
              format: int64
        responses:
          '200':
            description: OK
    /api/transactions/card/{cardId}:
      get:
        tags:
          - transaction-controller
        operationId: getTransactionsByCard
        parameters:
          - name: cardId
            in: path
            required: true
            schema:
              type: integer
              format: int64
        responses:
          '200':
            description: OK
            content:
              '*/*':
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/TransactionDTO'
    /api/cards/{id}:
      get:
        tags:
          - card-controller
        operationId: findById_1
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: integer
              format: int64
        responses:
          '200':
            description: OK
            content:
              '*/*':
                schema:
                  $ref: '#/components/schemas/CardDTO'
      delete:
        tags:
          - card-controller
        operationId: deleteCard
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: integer
              format: int64
        responses:
          '200':
            description: OK
    /api/cards/user/{userId}:
      get:
        tags:
          - card-controller
        operationId: findAllUserCards
        parameters:
          - name: userId
            in: path
            required: true
            schema:
              type: integer
              format: int64
          - name: page
            in: query
            required: false
            schema:
              type: integer
              format: int32
              default: 0
          - name: size
            in: query
            required: false
            schema:
              type: integer
              format: int32
              default: 10
        responses:
          '200':
            description: OK
            content:
              '*/*':
                schema:
                  $ref: '#/components/schemas/PageCardDTO'
  components:
    schemas:
      UserRequest:
        required:
          - password
          - username
        type: object
        properties:
          username:
            type: string
          password:
            maxLength: 2147483647
            minLength: 6
            type: string
          role:
            type: string
      CardDTO:
        type: object
        properties:
          maskedNumber:
            type: string
          cardStatus:
            type: string
            enum:
              - ACTIVE
              - BLOCKED
              - EXPIRED
          balance:
            type: number
          expirationDate:
            type: string
            format: date
          transactions:
            type: array
            items:
              $ref: '#/components/schemas/TransactionDTO'
      TransactionDTO:
        type: object
        properties:
          transactionName:
            type: string
          timeTransfer:
            type: string
            format: date-time
          amount:
            type: number
          descriptionTransaction:
            type: string
          operationType:
            type: string
      UserDTO:
        type: object
        properties:
          username:
            type: string
          role:
            type: string
          cards:
            type: array
            items:
              $ref: '#/components/schemas/CardDTO'
      TransactionRequest:
        required:
          - amount
          - fromCardId
          - purpose
          - toCardId
        type: object
        properties:
          purpose:
            type: string
          amount:
            minimum: 0.01
            exclusiveMinimum: false
            type: number
          fromCardId:
            type: integer
            format: int64
          toCardId:
            type: integer
            format: int64
      CardRequest:
        required:
          - cardNumber
          - cardStatus
          - expirationDate
          - userId
        type: object
        properties:
          userId:
            type: integer
            format: int64
          cardNumber:
            pattern: \d{16}
            type: string
          expirationDate:
            type: string
            format: date
          balance:
            minimum: 0
            exclusiveMinimum: false
            type: number
          cardStatus:
            type: string
            enum:
              - ACTIVE
              - BLOCKED
              - EXPIRED
      LoginRequest:
        required:
          - password
          - username
        type: object
        properties:
          username:
            type: string
          password:
            type: string
      LoginResponse:
        type: object
        properties:
          token:
            type: string
          username:
            type: string
          role:
            type: string
      PageCardDTO:
        type: object
        properties:
          totalElements:
            type: integer
            format: int64
          totalPages:
            type: integer
            format: int32
          size:
            type: integer
            format: int32
          content:
            type: array
            items:
              $ref: '#/components/schemas/CardDTO'
          number:
            type: integer
            format: int32
          sort:
            $ref: '#/components/schemas/SortObject'
          numberOfElements:
            type: integer
            format: int32
          first:
            type: boolean
          last:
            type: boolean
          pageable:
            $ref: '#/components/schemas/PageableObject'
          empty:
            type: boolean
      PageableObject:
        type: object
        properties:
          offset:
            type: integer
            format: int64
          sort:
            $ref: '#/components/schemas/SortObject'
          pageNumber:
            type: integer
            format: int32
          pageSize:
            type: integer
            format: int32
          unpaged:
            type: boolean
          paged:
            type: boolean
      SortObject:
        type: object
        properties:
          empty:
            type: boolean
          sorted:
            type: boolean
          unsorted:
            type: boolean
    securitySchemes:
      Bearer Authentication:
        type: http
        scheme: bearer
        bearerFormat: JWT