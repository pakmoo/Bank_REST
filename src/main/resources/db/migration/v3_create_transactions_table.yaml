databaseChangeLog:
  - changeSet:
      id: 4
      author: lina
      changes:
        - createTable:
            tableName: transactions
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: time
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: card_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_transaction_card
                    references: cards(id)
              - column:
                  name: description
                  type: VARCHAR(255)

  - changeSet:
      id: 5
      author: lina
      changes:
        - addDefaultValue:
            tableName: transactions
            columnName: time
            defaultValueComputed: CURRENT_TIMESTAMP